name: Api Contract Tests (NBP Network Verify)

on:
  schedule:
    - cron: '0 0 1 * *' # Będzie odpalane co miesiąc tj. każdego pirwszego dnia w msc.
  workflow_dispatch: # Można też uruchamiać manualnie z poziomu zakładki 'Actions' na GitHub

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run Network Contract Tests Against NBP API
        run: vendor/bin/phpunit tests --testdox --group contract
